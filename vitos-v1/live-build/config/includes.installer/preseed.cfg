# /preseed.cfg — VITOS unattended installer profile (Track 6D)
#
# Copy this file to a USB key as /preseed.cfg, then boot a workstation
# from the VITOS ISO with the boot menu's "Install (preseed)" entry.
# The installer will partition, install, configure SSO, and reboot
# without further interaction.

### Locale
d-i debian-installer/locale string en_IN
d-i keyboard-configuration/xkb-keymap select us

### Network — DHCP on the lab VLAN
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string vitos-bhopal-lab3
d-i netcfg/get_domain string lab.vitbhopal.local

### Mirror
d-i mirror/country string manual
d-i mirror/http/hostname string http.kali.org
d-i mirror/http/directory string /kali
d-i mirror/http/proxy string

### Account setup — disabled, FreeIPA SSO via vitos-sso takes over
d-i passwd/root-login boolean false
d-i passwd/make-user boolean false

### Clock + timezone
d-i clock-setup/utc boolean true
d-i time/zone string Asia/Kolkata
d-i clock-setup/ntp boolean true

### Partitioning — ext4 root + LUKS, single disk, atomic
d-i partman-auto/method string crypto
d-i partman-crypto/passphrase password CHANGEME-USB-PROVIDES
d-i partman-crypto/passphrase-again password CHANGEME-USB-PROVIDES
d-i partman-auto-lvm/guided_size string max
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

### Package selection — pull in everything VITOS
tasksel tasksel/first multiselect standard
d-i pkgsel/include string vitos-base vitos-tools vitos-monitor \
    vitos-dashboard vitos-ghost vitos-sso vitos-hardening vitos-vit-bhopal
d-i pkgsel/upgrade select none
popularity-contest popularity-contest/participate boolean false

### Boot loader
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean false
d-i grub-installer/bootdev string default

### Late command — stage the SSO config from the USB key, then run join
d-i preseed/late_command string \
    if [ -f /media/usb/sso.toml ]; then \
      cp /media/usb/sso.toml /target/etc/vitos/sso.toml ; \
      cp /media/usb/sso.password /target/etc/vitos/sso.password ; \
      chmod 0600 /target/etc/vitos/sso.password ; \
      in-target /usr/lib/vitos/sso/join.sh || true ; \
    fi

### Finish
d-i finish-install/reboot_in_progress note
