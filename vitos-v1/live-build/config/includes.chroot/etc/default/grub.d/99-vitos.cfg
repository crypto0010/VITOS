# VITOS GRUB defaults drop-in (sourced by grub-mkconfig after /etc/default/grub).
#
# Disable os-prober. Probing other disks/partitions for foreign OSes is the #1
# cause of `grub-mkconfig` returning a non-zero exit code on real lab hardware
# and in VMs — which Calamares treats as a fatal "Bootloader installation error"
# and aborts the whole install (see VITOS Error.mp4). A single-OS lab
# workstation never needs other-OS menu entries, so turning os-prober off both
# removes that failure class and speeds up grub.cfg generation.
#
# This drop-in lives in /etc/default/grub.d/ rather than /etc/default/grub so it
# survives Calamares' grubcfg module (which rewrites /etc/default/grub) and any
# later grub reconfiguration on the installed system.
#
# NOTE: this drop-in proved NOT to be honoured in the field (grub_fix.pdf showed
# the installed /etc/default/grub still had os-prober commented and os-prober
# still ran). The authoritative enforcement is now in the grub-mkconfig wrapper
# (includes.chroot/usr/local/share/vitos/grub-mkconfig), which writes
# GRUB_DISABLE_OS_PROBER=true straight into /etc/default/grub immediately before
# generating — exactly the manual step that fixed it. This file is kept as
# defence-in-depth for grub builds that DO source grub.d.
GRUB_DISABLE_OS_PROBER=true
