if loadfont /boot/grub/fonts/unicode.pf2 ; then
	set gfxmode=auto
	insmod all_video
	insmod gfxterm
fi
terminal_output gfxterm

set default=0
set timeout=30

insmod png
if background_image /boot/grub/splash.png ; then
	true
fi

set color_normal=light-gray/black
set color_highlight=white/dark-gray

menuentry "VITOS Live" {
	linux	@KERNEL_LIVE@ @APPEND_LIVE@
	initrd	@INITRD_LIVE@
}

menuentry "VITOS Live (fail-safe mode)" {
	linux	@KERNEL_LIVE@ @APPEND_LIVE@ noapic noapm nodma nomce nolapic nosmp nosplash vga=normal
	initrd	@INITRD_LIVE@
}

menuentry "VITOS Live (forensic mode)" {
	linux	@KERNEL_LIVE@ @APPEND_LIVE@ noswap noautomount
	initrd	@INITRD_LIVE@
}

menuentry "VITOS Live (USB persistence)" {
	linux	@KERNEL_LIVE@ @APPEND_LIVE@ persistence
	initrd	@INITRD_LIVE@
}
