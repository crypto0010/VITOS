label live-amd64
    menu label ^VITOS - Live (amd64)
    menu default
    linux /live/vmlinuz
    initrd /live/initrd.img
    append boot=live components quiet splash username=student

label live-amd64-failsafe
    menu label VITOS - Live (^failsafe)
    linux /live/vmlinuz
    initrd /live/initrd.img
    append boot=live components memtest noapic noapm nodma nomce nolapic nosmp nosplash vga=normal username=student
