name: smoke-test-kvm

# Full-stack smoke test with KVM hardware acceleration.
#
# The release build's smoke test runs under TCG soft-emulation (no /dev/kvm in
# the build container), which is far too slow to boot the whole live desktop +
# AI stack to multi-user and emit the 39 in-guest selftest markers. GitHub's
# hosted Linux runners DO have KVM hardware — the kernel just doesn't expose
# /dev/kvm to the job until we relax its permissions (the same trick the Android
# emulator action uses). This workflow opens /dev/kvm, downloads a published
# ISO, and runs the real selftest with -enable-kvm.
#
# To run on a beefier self-hosted box (e.g. for the RAM-hungry Ollama checks),
# register a runner with the `kvm` label and change `runs-on` below to
# [self-hosted, kvm], or raise SMOKE_MEM.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to test (blank = latest)"
        required: false
        default: ""
  push:
    paths:
      - ".github/workflows/smoke-test-kvm.yml"
      - "vitos-v1/tests/smoke-test.sh"

permissions:
  contents: read

jobs:
  smoke:
    name: Full-stack smoke test (KVM-accelerated)
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: Enable /dev/kvm for the job
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -l /dev/kvm || { echo "::error::no /dev/kvm on this runner"; exit 1; }

      - name: Install QEMU + tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq qemu-system-x86 qemu-utils ovmf xorriso cpu-checker
          echo "--- kvm-ok ---"; sudo kvm-ok || true
          echo "--- resources ---"; nproc; free -h

      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dl && cd dl
          TAG="${{ github.event.inputs.tag }}"
          if [ -n "$TAG" ]; then
            gh release download "$TAG" -R "$GITHUB_REPOSITORY" -p '*.part*.iso' -p 'SHA256SUMS'
          else
            gh release download -R "$GITHUB_REPOSITORY" -p '*.part*.iso' -p 'SHA256SUMS'
          fi
          ls -lh

      - name: Reassemble + verify checksum
        run: |
          cd dl
          BASE=$(ls *.part00.iso | sed 's/\.part00\.iso$//')
          cat "${BASE}".part*.iso > "${BASE}.iso"
          sha256sum -c SHA256SUMS
          rm -f "${BASE}".part*.iso
          echo "ISO=$PWD/${BASE}.iso" >> "$GITHUB_ENV"

      - name: Run full-stack smoke test (KVM)
        env:
          SMOKE_MEM: "5120"     # fits a 7 GB hosted runner; raise on self-hosted
          SMOKE_CPUS: "2"
          SMOKE_TIMEOUT: "1200" # 20 min — plenty with KVM
        run: |
          chmod +x vitos-v1/tests/smoke-test.sh
          vitos-v1/tests/smoke-test.sh "$ISO"
