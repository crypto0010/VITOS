name: ci

# Fast checks on every push: unit tests, Debian package builds (no kernel,
# no ISO). Should complete in 5–10 min on a free ubuntu-22.04 runner.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python-tests:
    name: Python AI engine + vitosctl tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install AI engine + tests
        working-directory: vitos-v1/packages/vitos-monitor/ai
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run AI engine tests
        working-directory: vitos-v1/packages/vitos-monitor/ai
        run: pytest -v

      - name: Install vitosctl + tests
        working-directory: vitos-v1/packages/vitos-monitor/cli
        run: |
          pip install -e .
          pip install pytest

      - name: Run vitosctl tests
        working-directory: vitos-v1/packages/vitos-monitor/cli
        run: pytest -v

  dashboard-tests:
    name: vitos-dashboard backend tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dashboard test deps
        run: |
          python -m pip install --upgrade pip
          pip install fastapi 'uvicorn[standard]' httpx pytest pydantic
      - name: Run dashboard tests
        working-directory: vitos-v1/packages/vitos-dashboard/backend
        run: pytest -v

  go-tests:
    name: Go event bus tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: vitos-v1/packages/vitos-monitor/busd/go.sum

      - name: Test vitos-busd
        working-directory: vitos-v1/packages/vitos-monitor/busd
        run: |
          go mod tidy
          go vet ./...
          go test -v ./...

      - name: Build vitos-busd binary
        working-directory: vitos-v1/packages/vitos-monitor/busd
        run: CGO_ENABLED=0 go build -o /tmp/vitos-busd .

  shellcheck:
    name: Shell script lint
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck (advisory — errors only)
        run: |
          # SC1091 = follow source (no system files in CI)
          # SC2154 = referenced but not assigned (env vars)
          # SC1008 / SC1113 = shell-tap.sh has no shebang on purpose (sourced)
          # Severity=error so warnings don't fail the build
          find vitos-v1 -name '*.sh' -print0 | xargs -0 \
            shellcheck --severity=error -e SC1091,SC2154,SC1008,SC1113 || true
          shellcheck --severity=error -e SC1091,SC2154 \
            vitos-v1/kernel/build-kernel.sh \
            vitos-v1/live-build/build-iso.sh \
            vitos-v1/branding/build-branding.sh \
            vitos-v1/tests/smoke-test.sh \
            vitos-v1/ollama-blob/fetch-model.sh || true

  debian-packages:
    name: Build vitos-base / vitos-tools / vitos-monitor (.deb)
    runs-on: ubuntu-22.04
    needs: [python-tests, go-tests]
    strategy:
      fail-fast: false
      matrix:
        pkg: [vitos-base, vitos-tools, vitos-monitor, vitos-dashboard, vitos-ghost, vitos-sso, vitos-hardening, vitos-vit-bhopal]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        if: matrix.pkg == 'vitos-dashboard'
        with:
          node-version: "20"

      - name: Install build tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            debhelper devscripts dpkg-dev fakeroot lintian build-essential \
            imagemagick fonts-dejavu-core

      - name: Generate branding artifacts (vitos-base prerequisite)
        if: matrix.pkg == 'vitos-base'
        run: |
          chmod +x vitos-v1/branding/build-branding.sh
          vitos-v1/branding/build-branding.sh

      - name: Stage prerequisite binaries (vitos-monitor only)
        if: matrix.pkg == 'vitos-monitor'
        run: |
          # vitos-monitor's debian/install expects build/{vitos-busd,vitos-bpf-exec,vitos-bpf-net}
          # CI just needs *something* there so dpkg-buildpackage doesn't error.
          # The real ISO build replaces these with the compiled artifacts.
          mkdir -p vitos-v1/packages/vitos-monitor/build
          touch vitos-v1/packages/vitos-monitor/build/vitos-busd
          touch vitos-v1/packages/vitos-monitor/build/vitos-bpf-exec
          touch vitos-v1/packages/vitos-monitor/build/vitos-bpf-net
          chmod +x vitos-v1/packages/vitos-monitor/build/*

      - name: Build ${{ matrix.pkg }}
        working-directory: vitos-v1/packages/${{ matrix.pkg }}
        run: |
          dpkg-buildpackage -us -uc -b
          ls -lh ../${{ matrix.pkg }}_*.deb

      - name: Lintian (warnings only)
        working-directory: vitos-v1/packages
        run: lintian ${{ matrix.pkg }}_*.deb || true

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.pkg }}-deb
          path: vitos-v1/packages/${{ matrix.pkg }}_*.deb
          retention-days: 7
