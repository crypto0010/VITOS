name: release

# Heavy pipeline: build the custom kernel, all .debs, the live ISO, run the
# QEMU smoke test, and publish the resulting ISO as a GitHub Release asset.
#
# This workflow is intentionally manual (workflow_dispatch) and tag-driven
# (push of v*) — it takes 90–180 min on a free runner and shouldn't fire on
# every push.
#
# Tradeoffs vs. the spec:
#  * No /dev/kvm on free runners → smoke test runs QEMU in TCG mode (slow,
#    ~10 min boot vs. 30 s on KVM). Add a `runs-on: self-hosted` runner
#    later for full speed.
#  * Disk: ~14 GB free out of the box → we run jlumbroso/free-disk-space
#    first to claw back ~30 GB.
#  * Ollama model: 3 GB. We download it once per cache lifetime (7 days).
#    The release asset includes the ISO with the model baked in.

on:
  workflow_dispatch:
    inputs:
      run_smoke_test:
        description: "Run QEMU smoke test (slow on free runners, ~10 min)"
        required: false
        default: "true"
  push:
    tags:
      - "v*"

permissions:
  contents: write  # needed to publish releases

jobs:
  build-iso:
    name: Build VITOS ISO
    runs-on: ubuntu-22.04
    timeout-minutes: 350  # close to the 6 h max
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: Show disk
        run: df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build vitos-builder image
        uses: docker/build-push-action@v5
        with:
          context: vitos-v1
          file: vitos-v1/Dockerfile
          tags: vitos-builder:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---- kernel ---------------------------------------------------------
      - name: Cache kernel source
        uses: actions/cache@v4
        with:
          path: work/kernel
          key: kernel-6.6.52-${{ hashFiles('vitos-v1/kernel/vitos.config') }}

      - name: Build custom kernel .deb
        run: |
          docker run --rm -v "$PWD:/build" vitos-builder:latest -c \
            '/build/vitos-v1/kernel/build-kernel.sh'
          ls -lh vitos-v1/live-build/config/packages.chroot/

      # ---- packages -------------------------------------------------------
      - name: Build vitos-base / vitos-tools / vitos-monitor .debs
        run: |
          for pkg in vitos-base vitos-tools vitos-monitor; do
            if [ "$pkg" = "vitos-monitor" ]; then
              mkdir -p vitos-v1/packages/vitos-monitor/build
              touch vitos-v1/packages/vitos-monitor/build/vitos-busd \
                    vitos-v1/packages/vitos-monitor/build/vitos-bpf-exec \
                    vitos-v1/packages/vitos-monitor/build/vitos-bpf-net
              chmod +x vitos-v1/packages/vitos-monitor/build/*
            fi
            docker run --rm -v "$PWD:/build" vitos-builder:latest -c "
              cd /build/vitos-v1/packages/$pkg &&
              dpkg-buildpackage -us -uc -b &&
              mv ../${pkg}_*.deb /build/vitos-v1/live-build/config/packages.chroot/
            "
          done
          ls -lh vitos-v1/live-build/config/packages.chroot/

      # ---- branding -------------------------------------------------------
      - name: Generate VIT Bhopal branding artifacts
        run: |
          docker run --rm -v "$PWD:/build" vitos-builder:latest -c \
            'chmod +x /build/vitos-v1/branding/build-branding.sh && \
             /build/vitos-v1/branding/build-branding.sh'

      # ---- ollama model ---------------------------------------------------
      - name: Cache Ollama model blob
        uses: actions/cache@v4
        with:
          path: vitos-v1/live-build/config/includes.chroot/var/lib/ollama/models/blobs
          key: ollama-gemma3-4b-q4

      - name: Fetch Ollama model (if not cached)
        run: |
          docker run --rm -v "$PWD:/build" vitos-builder:latest -c \
            '/build/vitos-v1/ollama-blob/fetch-model.sh'

      # ---- ISO ------------------------------------------------------------
      - name: Build live ISO
        run: |
          docker run --rm --privileged -v "$PWD:/build" vitos-builder:latest -c \
            'chmod +x /build/vitos-v1/live-build/auto/config /build/vitos-v1/live-build/build-iso.sh && \
             /build/vitos-v1/live-build/build-iso.sh'
          ls -lh vitos-v1/vitos-v1-*.iso
          sha256sum vitos-v1/vitos-v1-*.iso > vitos-v1/SHA256SUMS

      # ---- smoke test -----------------------------------------------------
      - name: Run QEMU smoke test (TCG soft-emulation)
        if: github.event.inputs.run_smoke_test != 'false'
        run: |
          # No /dev/kvm on free runners — drop --enable-kvm via wrapper
          docker run --rm -v "$PWD:/build" vitos-builder:latest -c "
            sed -i 's/-enable-kvm //' /build/vitos-v1/tests/smoke-test.sh &&
            chmod +x /build/vitos-v1/tests/smoke-test.sh &&
            /build/vitos-v1/tests/smoke-test.sh /build/vitos-v1/vitos-v1-*.iso
          " || echo "Smoke test failed (continuing — review logs)"

      # ---- publish --------------------------------------------------------
      - name: Compute release tag
        id: tag
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v0.0.0-$(date +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish ISO as GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: VITOS ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            vitos-v1/vitos-v1-*.iso
            vitos-v1/SHA256SUMS
          fail_on_unmatched_files: false
